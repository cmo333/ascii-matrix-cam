<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASCII Matrix Cam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }

  #ascii-output {
    white-space: pre;
    color: #00ff41;
    font-size: 10px;
    line-height: 1.0;
    letter-spacing: 1px;
    text-shadow: 0 0 5px #00ff41, 0 0 10px #003b00;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 10;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    z-index: 11;
  }

  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: #000;
    gap: 20px;
  }

  #start-screen h1 {
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 24px;
    text-shadow: 0 0 10px #00ff41, 0 0 20px #003b00;
    text-align: center;
    padding: 0 20px;
  }

  #start-screen p {
    color: #00aa30;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    text-align: center;
    padding: 0 20px;
  }

  #start-btn {
    background: transparent;
    color: #00ff41;
    border: 2px solid #00ff41;
    padding: 15px 40px;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    cursor: pointer;
    text-shadow: 0 0 5px #00ff41;
    box-shadow: 0 0 10px #003b00, inset 0 0 10px #003b00;
    transition: all 0.3s;
  }

  #start-btn:hover, #start-btn:active {
    background: #00ff4120;
    box-shadow: 0 0 20px #00ff41, inset 0 0 20px #003b00;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 10px;
    opacity: 0.4;
    transition: opacity 0.3s;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 95vw;
  }

  #controls:hover, #controls:active { opacity: 1; }

  .ctrl-btn {
    background: transparent;
    color: #00ff41;
    border: 1px solid #00ff4180;
    padding: 8px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    white-space: nowrap;
  }

  .ctrl-btn.active {
    background: #00ff4130;
    border-color: #00ff41;
  }

  #status-bar {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-shadow: 0 0 5px #00ff41;
    opacity: 0.6;
    text-align: right;
  }

  #status-bar .person-count {
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
  }

  video, canvas { display: none; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>// ASCII MATRIX CAM //</h1>
  <p>Live camera feed rendered as ASCII art<br>with Matrix digital rain aesthetic<br><br>Detects and highlights people</p>
  <button id="start-btn">[ ENTER THE MATRIX ]</button>
</div>

<div id="status-bar"></div>
<div id="ascii-output"></div>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="controls" style="display:none;">
  <button class="ctrl-btn" id="btn-flip">FLIP</button>
  <button class="ctrl-btn" id="btn-res">RES+</button>
  <button class="ctrl-btn active" id="btn-color">COLOR</button>
  <button class="ctrl-btn" id="btn-invert">INVERT</button>
  <button class="ctrl-btn active" id="btn-detect">DETECT</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<canvas id="detect-canvas"></canvas>

<script>
const ASCII_CHARS = ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
const MATRIX_CHARS = 'ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ012345789Z:・."=*+-<>¦╌ç';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const detectCanvas = document.getElementById('detect-canvas');
const detectCtx = detectCanvas.getContext('2d', { willReadFrequently: true });
const output = document.getElementById('ascii-output');
const statusBar = document.getElementById('status-bar');

let resLevel = 0;
const resOptions = [
  { charW: 6, charH: 12, label: 'RES+' },
  { charW: 4, charH: 8, label: 'RES++' },
  { charW: 8, charH: 16, label: 'RES-' },
];

let useColor = true;
let invert = false;
let detectPeople = true;
let facingMode = 'user';
let stream = null;
let running = false;

// Face detection
let faceDetector = null;
let hasFaceAPI = false;
let detectedFaces = []; // [{x, y, width, height} in video coordinates]
let faceRects = [];     // [{x1, y1, x2, y2} in ASCII grid coordinates]
let lastDetectTime = 0;
const DETECT_INTERVAL = 300; // ms between detection runs

// Try to use the native FaceDetector API (Chrome, Safari)
async function initFaceDetector() {
  if (typeof FaceDetector !== 'undefined') {
    try {
      faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 10 });
      hasFaceAPI = true;
      console.log('Using native FaceDetector API');
    } catch (e) {
      console.log('FaceDetector API not available, falling back to skin detection');
    }
  }
}
initFaceDetector();

// Start
document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  await startCamera();
});

async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    running = true;
    requestAnimationFrame(render);
  } catch (err) {
    output.textContent = `ERROR: ${err.message}\n\nCamera access is required.\nPlease allow camera permissions.`;
  }
}

// Detect faces using native API
async function detectFacesNative() {
  if (!faceDetector || !video.videoWidth) return;
  try {
    const faces = await faceDetector.detect(video);
    detectedFaces = faces.map(f => f.boundingBox);
  } catch (e) {
    // Detection can fail intermittently
  }
}

// Fallback: detect person-like regions using skin tone + motion
// Returns a boolean grid (same size as ASCII grid) marking "person" pixels
function detectSkinTones(pixels, cols, rows) {
  const mask = new Uint8Array(cols * rows);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2];

      // Skin tone detection in RGB space
      // Covers a wide range of skin tones
      if (isSkinTone(r, g, b)) {
        mask[y * cols + x] = 1;
      }
    }
  }

  // Dilate the mask to create connected person regions
  const dilated = new Uint8Array(cols * rows);
  const radius = 3;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (mask[y * cols + x]) {
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const ny = y + dy, nx = x + dx;
            if (ny >= 0 && ny < rows && nx >= 0 && nx < cols) {
              dilated[ny * cols + nx] = 1;
            }
          }
        }
      }
    }
  }

  // Find connected components and filter small ones
  return findPersonRegions(dilated, cols, rows);
}

function isSkinTone(r, g, b) {
  // Multiple skin detection rules for broad coverage
  // Rule 1: General RGB range
  if (r > 80 && g > 40 && b > 20 &&
      r > g && r > b &&
      (r - g) > 10 &&
      Math.abs(r - g) < 130 &&
      r - b > 15) {
    return true;
  }

  // Rule 2: HSV-based (approximate)
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const diff = max - min;
  if (diff > 0) {
    let h = 0;
    if (max === r) h = 60 * ((g - b) / diff);
    else if (max === g) h = 60 * (2 + (b - r) / diff);
    else h = 60 * (4 + (r - g) / diff);
    if (h < 0) h += 360;
    const s = diff / max;
    const v = max / 255;
    // Skin hue range: ~0-50 degrees, moderate saturation
    if (h >= 0 && h <= 50 && s >= 0.1 && s <= 0.7 && v >= 0.2) {
      return true;
    }
  }

  return false;
}

function findPersonRegions(mask, cols, rows) {
  // Simple flood fill to find connected regions
  const visited = new Uint8Array(cols * rows);
  const result = new Uint8Array(cols * rows);
  const minRegionSize = Math.floor(cols * rows * 0.005); // at least 0.5% of screen

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const idx = y * cols + x;
      if (mask[idx] && !visited[idx]) {
        // BFS flood fill
        const region = [];
        const queue = [idx];
        visited[idx] = 1;

        while (queue.length > 0) {
          const curr = queue.shift();
          region.push(curr);
          const cx = curr % cols;
          const cy = Math.floor(curr / cols);

          for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
            const nx = cx + dx, ny = cy + dy;
            const ni = ny * cols + nx;
            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && mask[ni] && !visited[ni]) {
              visited[ni] = 1;
              queue.push(ni);
            }
          }
        }

        // Only keep regions large enough to be a person
        if (region.length >= minRegionSize) {
          for (const idx of region) {
            result[idx] = 1;
          }
        }
      }
    }
  }

  return result;
}

// Convert face bounding boxes to ASCII grid coordinates
function mapFacesToGrid(cols, rows, vw, vh) {
  faceRects = [];
  const padding = 0.6; // expand box to capture body too

  for (const face of detectedFaces) {
    // Face coords are in video pixel space
    const fx = face.x / vw;
    const fy = face.y / vh;
    const fw = face.width / vw;
    const fh = face.height / vh;

    // Expand to approximate body region (face + body below)
    const bodyH = fh * 4; // body is roughly 4x face height
    const bodyW = fw * 2.5;
    const cx = fx + fw / 2;
    const bodyX = cx - bodyW / 2;

    let x1 = Math.floor((bodyX - fw * padding) * cols);
    let y1 = Math.floor((fy - fh * padding) * rows);
    let x2 = Math.ceil((bodyX + bodyW + fw * padding) * cols);
    let y2 = Math.ceil((fy + bodyH + fh * padding) * rows);

    x1 = Math.max(0, x1);
    y1 = Math.max(0, y1);
    x2 = Math.min(cols - 1, x2);
    y2 = Math.min(rows - 1, y2);

    faceRects.push({ x1, y1, x2, y2 });
  }
}

function isInFaceRect(x, y) {
  for (const r of faceRects) {
    if (x >= r.x1 && x <= r.x2 && y >= r.y1 && y <= r.y2) return true;
  }
  return false;
}

// Higher-res canvas for face detection (skin fallback)
let skinMask = null;

async function render() {
  if (!running) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) {
    requestAnimationFrame(render);
    return;
  }

  const screenW = window.innerWidth;
  const screenH = window.innerHeight;
  const { charW, charH } = resOptions[resLevel];

  const cols = Math.floor(screenW / charW);
  const rows = Math.floor(screenH / charH);

  canvas.width = cols;
  canvas.height = rows;

  // Mirror for front camera
  if (facingMode === 'user') {
    ctx.translate(cols, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(video, 0, 0, cols, rows);

  if (facingMode === 'user') {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  const imageData = ctx.getImageData(0, 0, cols, rows);
  const pixels = imageData.data;

  // Run detection periodically
  const now = performance.now();
  if (detectPeople && now - lastDetectTime > DETECT_INTERVAL) {
    lastDetectTime = now;

    if (hasFaceAPI) {
      await detectFacesNative();
      mapFacesToGrid(cols, rows, vw, vh);
    } else {
      // Skin tone fallback
      skinMask = detectSkinTones(pixels, cols, rows);
    }
  }

  // Determine highlight for each pixel
  const isHighlighted = new Uint8Array(cols * rows);
  if (detectPeople) {
    if (hasFaceAPI && faceRects.length > 0) {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (isInFaceRect(x, y)) {
            isHighlighted[y * cols + x] = 1;
          }
        }
      }
    } else if (!hasFaceAPI && skinMask) {
      for (let i = 0; i < cols * rows; i++) {
        isHighlighted[i] = skinMask[i];
      }
    }
  }

  // Count detected people
  let personCount = 0;
  if (detectPeople) {
    if (hasFaceAPI) {
      personCount = detectedFaces.length;
    } else if (skinMask) {
      // Count connected regions as approximate person count
      let hasHighlight = false;
      for (let i = 0; i < isHighlighted.length; i++) {
        if (isHighlighted[i]) { hasHighlight = true; break; }
      }
      personCount = hasHighlight ? '?' : 0;
    }
  }

  // Update status bar
  if (detectPeople) {
    const method = hasFaceAPI ? 'FACE_API' : 'SKIN_DETECT';
    statusBar.innerHTML = `[${method}] <span class="person-count">TARGETS: ${personCount}</span>`;
  } else {
    statusBar.innerHTML = '';
  }

  // Build ASCII output
  const charLen = ASCII_CHARS.length;
  let html = '';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const r = pixels[i];
      const g = pixels[i + 1];
      const b = pixels[i + 2];

      let brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      if (invert) brightness = 1 - brightness;

      const charIndex = Math.floor(brightness * (charLen - 1));
      const ch = ASCII_CHARS[charIndex];
      const highlighted = isHighlighted[y * cols + x];

      if (ch === ' ') {
        if (highlighted) {
          html += '<span style="color:#001a1a;text-shadow:none">.</span>';
        } else {
          html += ' ';
        }
      } else if (useColor) {
        const idx = charIndex;
        const t = idx / (charLen - 1);

        if (highlighted) {
          // Cyan/white highlight for detected people
          const rr = Math.floor(30 + t * 200);
          const gg = Math.floor(200 + t * 55);
          const bb = Math.floor(200 + t * 55);
          html += `<span style="color:rgb(${rr},${gg},${bb});text-shadow:0 0 6px #00ffff,0 0 12px #005577">${ch}</span>`;
        } else {
          // Normal green matrix
          const gBase = Math.floor(80 + t * 175);
          const rAdd = Math.floor(t * t * 80);
          const bAdd = Math.floor(t * t * 40);
          html += `<span style="color:rgb(${rAdd},${gBase},${bAdd})">${ch}</span>`;
        }
      } else {
        if (highlighted) {
          html += `<span style="color:#00ffff;text-shadow:0 0 6px #00ffff">${ch}</span>`;
        } else {
          html += ch;
        }
      }
    }
    if (y < rows - 1) html += '\n';
  }

  output.innerHTML = html;
  requestAnimationFrame(render);
}

// Matrix glitch effect
setInterval(() => {
  if (Math.random() < 0.3) {
    const spans = output.querySelectorAll('span');
    if (spans.length > 0) {
      const count = Math.floor(Math.random() * 8) + 1;
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * spans.length);
        const mc = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
        const origText = spans[idx].textContent;
        const origColor = spans[idx].style.color;
        spans[idx].textContent = mc;
        spans[idx].style.color = '#ffffff';
        spans[idx].style.textShadow = '0 0 10px #00ff41, 0 0 20px #00ffff';
        setTimeout(() => {
          if (spans[idx]) {
            spans[idx].textContent = origText;
            spans[idx].style.color = origColor;
            spans[idx].style.textShadow = '';
          }
        }, 120);
      }
    }
  }
}, 80);

// Controls
document.getElementById('btn-flip').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('btn-res').addEventListener('click', () => {
  resLevel = (resLevel + 1) % resOptions.length;
  document.getElementById('btn-res').textContent = resOptions[resLevel].label;
});

document.getElementById('btn-color').addEventListener('click', (e) => {
  useColor = !useColor;
  e.target.classList.toggle('active', useColor);
});

document.getElementById('btn-invert').addEventListener('click', (e) => {
  invert = !invert;
  e.target.classList.toggle('active', invert);
});

document.getElementById('btn-detect').addEventListener('click', (e) => {
  detectPeople = !detectPeople;
  e.target.classList.toggle('active', detectPeople);
  if (!detectPeople) {
    detectedFaces = [];
    faceRects = [];
    skinMask = null;
    statusBar.innerHTML = '';
  }
});
</script>
</body>
</html>
