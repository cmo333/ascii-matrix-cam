<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASCII Matrix Cam</title>
<style>
  :root {
    --primary: #00ff41;
    --primary-dim: #00aa30;
    --primary-bg: #003b00;
    --background: #000a00;
    --glow: 0 0 5px #00ff41, 0 0 10px #003b00;
    --scanline-color: rgba(0, 0, 0, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--background);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.4s;
  }

  #ascii-output {
    white-space: pre;
    color: var(--primary);
    font-size: 10px;
    line-height: 1.0;
    letter-spacing: 1px;
    text-shadow: var(--glow);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline-color) 0px,
      var(--scanline-color) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 10;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    z-index: 11;
  }

  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: #000;
    gap: 20px;
  }

  #start-screen h1 {
    color: var(--primary);
    font-family: 'Courier New', monospace;
    font-size: 24px;
    text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary-bg);
    text-align: center;
    padding: 0 20px;
  }

  #start-screen p {
    color: var(--primary-dim);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    text-align: center;
    padding: 0 20px;
  }

  #start-btn {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 15px 40px;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    cursor: pointer;
    text-shadow: 0 0 5px var(--primary);
    box-shadow: 0 0 10px var(--primary-bg), inset 0 0 10px var(--primary-bg);
    transition: all 0.3s;
  }

  #start-btn:hover, #start-btn:active {
    background: color-mix(in srgb, var(--primary) 12%, transparent);
    box-shadow: 0 0 20px var(--primary), inset 0 0 20px var(--primary-bg);
  }

  #loading-status {
    color: var(--primary-dim);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    display: none;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 8px;
    opacity: 0.4;
    transition: opacity 0.3s;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 95vw;
  }

  #controls:hover, #controls:active { opacity: 1; }

  .ctrl-btn {
    background: transparent;
    color: var(--primary);
    border: 1px solid color-mix(in srgb, var(--primary) 50%, transparent);
    padding: 8px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    white-space: nowrap;
    transition: color 0.3s, border-color 0.3s;
  }

  .ctrl-btn.active {
    background: color-mix(in srgb, var(--primary) 18%, transparent);
    border-color: var(--primary);
  }

  #status-bar {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    color: var(--primary);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-shadow: 0 0 5px var(--primary);
    opacity: 0.6;
    text-align: right;
  }

  #rec-indicator {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 20;
    color: #ff3333;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    display: none;
    align-items: center;
    gap: 6px;
    text-shadow: 0 0 8px #ff0000;
  }

  .rec-dot {
    width: 10px;
    height: 10px;
    background: #ff0000;
    border-radius: 50%;
    animation: rec-blink 1s infinite;
    box-shadow: 0 0 6px #ff0000;
  }

  @keyframes rec-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .ctrl-btn.recording {
    color: #ff3333 !important;
    border-color: #ff3333 !important;
    background: rgba(255, 0, 0, 0.15) !important;
    animation: rec-blink 1s infinite;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    display: none;
  }

  body.hybrid-mode #bg-canvas { display: block; }
  body.hybrid-mode #ascii-output { z-index: 2; }
  body.hybrid-mode { background: #000; }

  video, canvas:not(#bg-canvas) { display: none; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>// ASCII MATRIX CAM //</h1>
  <p>Live camera feed rendered as ASCII art<br>with Matrix digital rain aesthetic<br><br>AI-powered body segmentation</p>
  <button id="start-btn">[ ENTER THE MATRIX ]</button>
  <div id="loading-status">Loading AI model...</div>
</div>

<div id="rec-indicator"><span class="rec-dot"></span> REC</div>
<div id="status-bar"></div>
<div id="ascii-output"></div>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="controls" style="display:none;">
  <button class="ctrl-btn" id="btn-theme">MATRIX</button>
  <button class="ctrl-btn" id="btn-flip">FLIP</button>
  <button class="ctrl-btn" id="btn-res">RES+</button>
  <button class="ctrl-btn active" id="btn-color">COLOR</button>
  <button class="ctrl-btn" id="btn-invert">INVERT</button>
  <button class="ctrl-btn active" id="btn-detect">SEGMENT</button>
  <button class="ctrl-btn" id="btn-hybrid">ISOLATE</button>
  <button class="ctrl-btn" id="btn-record" style="display:none;">REC</button>
  <button class="ctrl-btn" id="btn-snap">SNAP</button>
</div>

<canvas id="bg-canvas"></canvas>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<canvas id="seg-canvas"></canvas>
<canvas id="record-canvas"></canvas>

<script type="module">
import { ImageSegmenter, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm';

// ── Character Sets ──────────────────────────────────────────────
const ASCII_CHARS = ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
const MATRIX_CHARS = 'ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ012345789Z:・."=*+-<>¦╌ç';

// ── Themes ──────────────────────────────────────────────────────
const THEMES = {
  matrix: {
    name: 'MATRIX',
    primary: '#00ff41', primaryDim: '#00aa30', primaryBg: '#003b00',
    background: '#000a00',
    glow: '0 0 5px #00ff41, 0 0 10px #003b00',
    scanlineColor: 'rgba(0, 0, 0, 0.15)',
    charColor(t) {
      return `rgb(${t*t*80|0},${80+t*175|0},${t*t*40|0})`;
    },
    highlightColor(t) {
      return `rgb(${30+t*200|0},${200+t*55|0},${200+t*55|0})`;
    },
    highlightGlow: '0 0 6px #00ffff,0 0 12px #005577',
    highlightDimColor: '#001a1a',
    glitchColor: '#ffffff',
    glitchGlow: '0 0 10px #00ff41, 0 0 20px #00ffff',
  },
  amber: {
    name: 'AMBER',
    primary: '#ffb000', primaryDim: '#aa7500', primaryBg: '#3b2200',
    background: '#0a0500',
    glow: '0 0 5px #ffb000, 0 0 10px #3b2200',
    scanlineColor: 'rgba(10, 5, 0, 0.15)',
    charColor(t) {
      return `rgb(${100+t*155|0},${50+t*126|0},${t*t*30|0})`;
    },
    highlightColor(t) {
      return `rgb(${200+t*55|0},${190+t*65|0},${80+t*150|0})`;
    },
    highlightGlow: '0 0 6px #ffe0a0,0 0 12px #775500',
    highlightDimColor: '#1a1000',
    glitchColor: '#ffffff',
    glitchGlow: '0 0 10px #ffb000, 0 0 20px #ffe0a0',
  },
  synthwave: {
    name: 'SYNTH',
    primary: '#ff00ff', primaryDim: '#aa00aa', primaryBg: '#3b003b',
    background: '#0a000e',
    glow: '0 0 5px #ff00ff, 0 0 10px #3b003b',
    scanlineColor: 'rgba(5, 0, 10, 0.15)',
    charColor(t) {
      return `rgb(${80+t*175|0},${t*t*60|0},${100+t*155|0})`;
    },
    highlightColor(t) {
      return `rgb(${50+t*200|0},${200+t*55|0},${220+t*35|0})`;
    },
    highlightGlow: '0 0 6px #00ffff,0 0 12px #ff00ff',
    highlightDimColor: '#0a0a1a',
    glitchColor: '#00ffff',
    glitchGlow: '0 0 10px #ff00ff, 0 0 20px #00ffff',
  },
  blueprint: {
    name: 'BLUE',
    primary: '#4da6ff', primaryDim: '#2a7acc', primaryBg: '#0a2a4a',
    background: '#000a1a',
    glow: '0 0 5px #4da6ff, 0 0 10px #0a2a4a',
    scanlineColor: 'rgba(0, 2, 10, 0.15)',
    charColor(t) {
      return `rgb(${40+t*80|0},${80+t*120|0},${140+t*115|0})`;
    },
    highlightColor(t) {
      return `rgb(${180+t*75|0},${200+t*55|0},${220+t*35|0})`;
    },
    highlightGlow: '0 0 6px #ffffff,0 0 12px #4da6ff',
    highlightDimColor: '#000a15',
    glitchColor: '#ffffff',
    glitchGlow: '0 0 10px #4da6ff, 0 0 20px #ffffff',
  },
  red: {
    name: 'RED',
    primary: '#ff2222', primaryDim: '#aa1111', primaryBg: '#3b0000',
    background: '#0a0000',
    glow: '0 0 5px #ff2222, 0 0 10px #3b0000',
    scanlineColor: 'rgba(10, 0, 0, 0.15)',
    charColor(t) {
      return `rgb(${100+t*155|0},${t*t*40|0},${t*t*20|0})`;
    },
    highlightColor(t) {
      return `rgb(${200+t*55|0},${100+t*155|0},${50+t*100|0})`;
    },
    highlightGlow: '0 0 6px #ffaa44,0 0 12px #ff2222',
    highlightDimColor: '#1a0500',
    glitchColor: '#ffff00',
    glitchGlow: '0 0 10px #ff2222, 0 0 20px #ffaa44',
  },
};

const themeKeys = Object.keys(THEMES);
let currentThemeIndex = 0;
let theme = THEMES.matrix;

function applyTheme(key) {
  theme = THEMES[key];
  const s = document.documentElement.style;
  s.setProperty('--primary', theme.primary);
  s.setProperty('--primary-dim', theme.primaryDim);
  s.setProperty('--primary-bg', theme.primaryBg);
  s.setProperty('--background', theme.background);
  s.setProperty('--glow', theme.glow);
  s.setProperty('--scanline-color', theme.scanlineColor);
}

// ── DOM Elements ────────────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const segCanvas = document.getElementById('seg-canvas');
const segCtx = segCanvas.getContext('2d', { willReadFrequently: true });
const output = document.getElementById('ascii-output');
const statusBar = document.getElementById('status-bar');
const recordCanvas = document.getElementById('record-canvas');
const recordCtx = recordCanvas.getContext('2d');
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
const recIndicator = document.getElementById('rec-indicator');
const btnRecord = document.getElementById('btn-record');
const btnSnap = document.getElementById('btn-snap');
const loadingStatus = document.getElementById('loading-status');

// ── State ───────────────────────────────────────────────────────
let resLevel = 0;
const resOptions = [
  { charW: 6, charH: 12, label: 'RES+' },
  { charW: 4, charH: 8, label: 'RES++' },
  { charW: 8, charH: 16, label: 'RES-' },
];

let useColor = true;
let invert = false;
let detectPeople = true;
let hybridMode = false;
let facingMode = 'user';
let stream = null;
let running = false;

let curCols = 0, curRows = 0, curCharW = 6, curCharH = 12;
let curCells = null;

// ── MediaPipe Segmentation ──────────────────────────────────────
let segmenter = null;
let segMask = null;         // Float32Array of confidence values (0.0-1.0) at segmenter resolution
let segMaskW = 0, segMaskH = 0;
let segReady = false;
let lastSegTime = 0;
const SEG_INTERVAL = 50;    // Run segmentation every 50ms (~20fps) for smooth tracking
const SEG_THRESHOLD = 0.5;  // Confidence threshold: pixel is "person" if >= this value

async function initSegmenter() {
  loadingStatus.style.display = 'block';
  loadingStatus.textContent = 'Loading AI segmentation model...';
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
    );
    segmenter = await ImageSegmenter.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      outputCategoryMask: false,
      outputConfidenceMasks: true,
    });
    segReady = true;
    loadingStatus.textContent = 'AI model loaded. Ready.';
    setTimeout(() => { loadingStatus.style.display = 'none'; }, 1000);
  } catch (e) {
    console.error('Segmenter init failed:', e);
    loadingStatus.textContent = 'AI model failed to load. Using basic detection.';
    setTimeout(() => { loadingStatus.style.display = 'none'; }, 3000);
  }
}

function runSegmentation() {
  if (!segmenter || !video.videoWidth) return;
  try {
    const result = segmenter.segmentForVideo(video, performance.now());
    if (result.confidenceMasks && result.confidenceMasks.length > 0) {
      const mask = result.confidenceMasks[0];
      // Get the raw float data - this is the person confidence per pixel
      segMask = mask.getAsFloat32Array();
      segMaskW = mask.width;
      segMaskH = mask.height;
      mask.close();
    }
    if (result.categoryMask) result.categoryMask.close();
  } catch (e) {
    // Can fail intermittently, that's fine
  }
}

// Sample the segmentation mask at ASCII grid coordinates
// The mask is at video resolution, we need to map to our cols x rows grid
function getSegMaskForGrid(cols, rows) {
  const highlighted = new Uint8Array(cols * rows);
  if (!segMask || !segMaskW || !segMaskH) return highlighted;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      // Map grid position to mask position
      // Account for mirror flip on front camera
      let mx;
      if (facingMode === 'user') {
        mx = ((cols - 1 - x) / cols * segMaskW) | 0;
      } else {
        mx = (x / cols * segMaskW) | 0;
      }
      const my = (y / rows * segMaskH) | 0;
      const mi = my * segMaskW + mx;
      if (mi < segMask.length && segMask[mi] >= SEG_THRESHOLD) {
        highlighted[y * cols + x] = 1;
      }
    }
  }
  return highlighted;
}

// ── Recording ───────────────────────────────────────────────────
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let canUseMediaRecorder = false;

function checkMediaRecorderSupport() {
  try {
    const tc = document.createElement('canvas');
    tc.width = tc.height = 2;
    const ts = tc.captureStream(0);
    const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
    for (const mime of mimeTypes) {
      if (MediaRecorder.isTypeSupported(mime)) {
        canUseMediaRecorder = true;
        break;
      }
    }
  } catch (e) {
    canUseMediaRecorder = false;
  }
  btnRecord.style.display = canUseMediaRecorder ? '' : 'none';
}
checkMediaRecorderSupport();

function renderToCanvas() {
  if (!curCells || !curCols || !curRows) return;
  const w = curCols * curCharW;
  const h = curRows * curCharH;
  recordCanvas.width = w;
  recordCanvas.height = h;

  if (hybridMode) {
    if (facingMode === 'user') { recordCtx.translate(w, 0); recordCtx.scale(-1, 1); }
    recordCtx.drawImage(video, 0, 0, w, h);
    if (facingMode === 'user') recordCtx.setTransform(1, 0, 0, 1, 0, 0);
  } else {
    recordCtx.fillStyle = theme.background;
    recordCtx.fillRect(0, 0, w, h);
  }

  recordCtx.font = `${curCharH}px 'Courier New', monospace`;
  recordCtx.textBaseline = 'top';

  for (let y = 0; y < curRows; y++) {
    for (let x = 0; x < curCols; x++) {
      const cell = curCells[y * curCols + x];
      if (cell.ch === ' ' || cell.color === 'transparent') continue;
      if (hybridMode) {
        recordCtx.fillStyle = 'rgba(0,0,0,0.55)';
        recordCtx.fillRect(x * curCharW, y * curCharH, curCharW, curCharH);
      }
      recordCtx.fillStyle = cell.color;
      recordCtx.fillText(cell.ch, x * curCharW, y * curCharH);
    }
  }
}

function startRecording() {
  recordedChunks = [];
  renderToCanvas();
  const capturedStream = recordCanvas.captureStream(30);
  const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
  const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || '';

  mediaRecorder = new MediaRecorder(capturedStream, { mimeType, videoBitsPerSecond: 2500000 });
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mimeType || 'video/webm' });
    shareOrDownload(blob, `ascii-cam-${Date.now()}.webm`);
  };
  mediaRecorder.start(100);
  isRecording = true;
  btnRecord.textContent = 'STOP';
  btnRecord.classList.add('recording');
  recIndicator.style.display = 'flex';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  btnRecord.textContent = 'REC';
  btnRecord.classList.remove('recording');
  recIndicator.style.display = 'none';
}

function takeScreenshot() {
  renderToCanvas();
  recordCanvas.toBlob((blob) => {
    if (blob) shareOrDownload(blob, `ascii-cam-${Date.now()}.png`);
  }, 'image/png');
}

async function shareOrDownload(blob, fileName) {
  const file = new File([blob], fileName, { type: blob.type });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'ASCII Matrix Cam' });
      return;
    } catch (e) { /* fall through */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Camera ──────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  await startCamera();
});

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    running = true;
    requestAnimationFrame(render);
  } catch (err) {
    output.textContent = `ERROR: ${err.message}\n\nCamera access is required.\nPlease allow camera permissions.`;
  }
}

// ── Render Loop ─────────────────────────────────────────────────
async function render() {
  if (!running) return;

  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(render); return; }

  const screenW = window.innerWidth, screenH = window.innerHeight;
  const { charW, charH } = resOptions[resLevel];
  const cols = screenW / charW | 0;
  const rows = screenH / charH | 0;

  canvas.width = cols;
  canvas.height = rows;

  if (facingMode === 'user') { ctx.translate(cols, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, 0, 0, cols, rows);
  if (facingMode === 'user') ctx.setTransform(1, 0, 0, 1, 0, 0);

  // Draw background video for hybrid/isolate mode
  if (hybridMode) {
    bgCanvas.width = screenW;
    bgCanvas.height = screenH;
    if (facingMode === 'user') { bgCtx.translate(screenW, 0); bgCtx.scale(-1, 1); }
    bgCtx.drawImage(video, 0, 0, screenW, screenH);
    if (facingMode === 'user') bgCtx.setTransform(1, 0, 0, 1, 0, 0);
  }

  const imageData = ctx.getImageData(0, 0, cols, rows);
  const pixels = imageData.data;

  // Run segmentation
  const now = performance.now();
  if (detectPeople && segReady && now - lastSegTime > SEG_INTERVAL) {
    lastSegTime = now;
    runSegmentation();
  }

  // Build highlight map from segmentation mask
  let isHighlighted;
  if (detectPeople && segReady && segMask) {
    isHighlighted = getSegMaskForGrid(cols, rows);
  } else {
    isHighlighted = new Uint8Array(cols * rows);
  }

  // Status bar
  if (detectPeople) {
    const mode = segReady ? 'AI_SEGMENT' : 'LOADING...';
    statusBar.innerHTML = `[${mode}]`;
  } else {
    statusBar.innerHTML = '';
  }

  // Build cells array + HTML
  const charLen = ASCII_CHARS.length;
  const cells = new Array(rows * cols);
  let html = '';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2];

      let brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      if (invert) brightness = 1 - brightness;

      const charIndex = brightness * (charLen - 1) | 0;
      const ch = ASCII_CHARS[charIndex];
      const t = charIndex / (charLen - 1);
      const hl = isHighlighted[y * cols + x];

      if (hybridMode) {
        // ISOLATE: ASCII on person, raw camera behind
        if (hl) {
          const color = ch === ' ' ? theme.highlightDimColor : theme.highlightColor(t);
          const displayCh = ch === ' ' ? '.' : ch;
          cells[y * cols + x] = { ch: displayCh, color };
          html += `<span style="color:${color};text-shadow:${theme.highlightGlow};background:rgba(0,0,0,0.55)">${displayCh}</span>`;
        } else {
          cells[y * cols + x] = { ch: ' ', color: 'transparent' };
          html += ' ';
        }
      } else {
        // NORMAL: full ASCII everywhere
        let color;
        if (ch === ' ') {
          color = hl ? theme.highlightDimColor : theme.background;
        } else if (hl) {
          color = theme.highlightColor(t);
        } else {
          color = theme.charColor(t);
        }

        cells[y * cols + x] = { ch: ch === ' ' && hl ? '.' : ch, color };

        if (ch === ' ' && !hl) {
          html += ' ';
        } else if (!useColor && !hl) {
          html += ch;
        } else {
          const glow = hl ? `;text-shadow:${theme.highlightGlow}` : '';
          html += `<span style="color:${color}${glow}">${ch === ' ' && hl ? '.' : ch}</span>`;
        }
      }
    }
    if (y < rows - 1) html += '\n';
  }

  curCols = cols; curRows = rows; curCharW = charW; curCharH = charH; curCells = cells;

  if (useColor || detectPeople || hybridMode) {
    output.innerHTML = html;
  } else {
    let text = '';
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) text += cells[y * cols + x].ch;
      if (y < rows - 1) text += '\n';
    }
    output.textContent = text;
  }

  if (isRecording) renderToCanvas();
  requestAnimationFrame(render);
}

// ── Glitch Effect ───────────────────────────────────────────────
setInterval(() => {
  if (Math.random() < 0.3) {
    const spans = output.querySelectorAll('span');
    if (spans.length > 0) {
      const count = (Math.random() * 8 | 0) + 1;
      for (let i = 0; i < count; i++) {
        const idx = Math.random() * spans.length | 0;
        const mc = MATRIX_CHARS[Math.random() * MATRIX_CHARS.length | 0];
        const origText = spans[idx].textContent;
        const origColor = spans[idx].style.color;
        spans[idx].textContent = mc;
        spans[idx].style.color = theme.glitchColor;
        spans[idx].style.textShadow = theme.glitchGlow;
        setTimeout(() => {
          if (spans[idx]) {
            spans[idx].textContent = origText;
            spans[idx].style.color = origColor;
            spans[idx].style.textShadow = '';
          }
        }, 120);
      }
    }
  }
}, 80);

// ── Controls ────────────────────────────────────────────────────
document.getElementById('btn-theme').addEventListener('click', () => {
  currentThemeIndex = (currentThemeIndex + 1) % themeKeys.length;
  applyTheme(themeKeys[currentThemeIndex]);
  document.getElementById('btn-theme').textContent = theme.name;
});

document.getElementById('btn-flip').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('btn-res').addEventListener('click', () => {
  resLevel = (resLevel + 1) % resOptions.length;
  document.getElementById('btn-res').textContent = resOptions[resLevel].label;
});

document.getElementById('btn-color').addEventListener('click', (e) => {
  useColor = !useColor;
  e.target.classList.toggle('active', useColor);
});

document.getElementById('btn-invert').addEventListener('click', (e) => {
  invert = !invert;
  e.target.classList.toggle('active', invert);
});

document.getElementById('btn-detect').addEventListener('click', (e) => {
  detectPeople = !detectPeople;
  e.target.classList.toggle('active', detectPeople);
  if (!detectPeople) { segMask = null; statusBar.innerHTML = ''; }
});

document.getElementById('btn-hybrid').addEventListener('click', (e) => {
  hybridMode = !hybridMode;
  e.target.classList.toggle('active', hybridMode);
  document.body.classList.toggle('hybrid-mode', hybridMode);
  if (hybridMode && !detectPeople) {
    detectPeople = true;
    document.getElementById('btn-detect').classList.add('active');
  }
});

btnRecord.addEventListener('click', () => {
  if (!isRecording) startRecording();
  else stopRecording();
});

btnSnap.addEventListener('click', takeScreenshot);

// ── Init ────────────────────────────────────────────────────────
initSegmenter();
</script>
</body>
</html>
